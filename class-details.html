<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Details - Vendocine</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>💊 Vendocine</h2>
                <p>Class Details</p>
            </div>

            <div class="class-info">
                <h3 id="class-name">Loading...</h3>
                <p id="class-teacher">Teacher: Loading...</p>
                <p id="class-students-count">Students: Loading...</p>
            </div>

            <div class="students-list">
                <h4>Students</h4>
                <div id="students-sidebar-list"></div>
            </div>

            <div class="sidebar-actions">
                <button onclick="goBackToAdmin()" class="btn-secondary">← Back to Admin</button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <h1>Class Details Dashboard</h1>
                <div class="header-actions">
                    <span id="current-time"></span>
                </div>
            </header>

            <!-- Claims Summary Section -->
            <section id="claims-summary" class="content-section">
                <h2>📋 Recent Claims Summary</h2>

                <div class="summary-cards">
                    <div class="summary-card">
                        <h3>Today's Claims</h3>
                        <p id="today-claims-count" class="stat-number">0</p>
                    </div>
                    <div class="summary-card">
                        <h3>This Week</h3>
                        <p id="week-claims-count" class="stat-number">0</p>
                    </div>
                    <div class="summary-card">
                        <h3>This Month</h3>
                        <p id="month-claims-count" class="stat-number">0</p>
                    </div>
                    <div class="summary-card">
                        <h3>Total Claims</h3>
                        <p id="total-claims-count" class="stat-number">0</p>
                    </div>
                </div>

                <div class="recent-claims">
                    <h3>Last 10 Claims</h3>
                    <div id="recent-claims-table" class="data-table">
                        <div class="table-header">
                            <div>Student</div>
                            <div>Time</div>
                            <div>Pills Left</div>
                        </div>
                        <div id="claims-list"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/class-details.js"></script>
</body>
</html>
